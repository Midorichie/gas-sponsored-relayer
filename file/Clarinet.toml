[project]
name = "gas-sponsored-relayer"
version = "2.0.0"
description = "Enhanced gas-sponsored transaction relayer with security improvements and fee management"
authors = ["Midorichie <hamsohood@gmail.com>"]
license = "MIT"
keywords = ["stacks", "clarity", "relayer", "gas", "sponsored", "transaction-processor"]

# Main contracts
[contracts.transaction-processor]
path = "contracts/transaction-processor.clar"
clarity_version = 2
epoch = "2.5"

[contracts.fee-manager]
path = "contracts/fee-manager.clar"
clarity_version = 2
epoch = "2.5"

[contracts.relayer]
path = "contracts/relayer.clar"
clarity_version = 2
epoch = "2.5"

# REPL configuration
[repl]
costs_version = 2
parser_version = 2

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = true
trusted_sender = false
trusted_caller = false
callee_filter = true


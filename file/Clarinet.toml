# Requirements
[project.requirements]
clarinet = ">=1.7.0"

# Network configurations
[project.network.testnet]
stacks_node_rpc_address = "https://stacks-node-api.testnet.stacks.co"
bitcoin_node_rpc_address = "https://bitcoin.testnet.stacks.co"

[project.network.mainnet]
stacks_node_rpc_address = "https://stacks-node-api.mainnet.stacks.co"
bitcoin_node_rpc_address = "https://bitcoin.mainnet.stacks.co"

# Development settings
cache_dir = ".cache"

# Test configuration
[project.test]
coverage = true
